<!DOCTYPE html>
<html>
<head>
 <title>document.write vs console.log</title>
</head>
<body>
 <script>
   // Writes directly to the HTML page
   document.write("Hello from document.write!<br>");
   // Logs to the browser console (F12 → Console tab)
   console.log("Hello from console.log!");
 </script>
</body>
</html>
