<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Student Dashboard</title>

<style>
body{
    font-family: Arial;
    padding:20px;
}

button{
    margin:5px;
    padding:8px;
}

.student{
    border:1px solid gray;
    padding:10px;
    margin:10px 0;
}
</style>

</head>
<body>

<h1>Student Management Dashboard</h1>

<button id="showStudents">Show Students</button>
<button id="addStudent">Add Student</button>
<button id="filterStudents">Filter Marks > 80</button>
<button id="searchStudent">Search Student</button>

<h2>Date & Time</h2>
<p id="dateTime"></p>

<h2>Random Number</h2>
<button id="generateNumber">Generate</button>
<p id="randomNumber"></p>

<h2>Countdown Timer</h2>
<p id="timer">10</p>

<h2>Students</h2>
<div id="studentContainer"></div>

<script src="script.js"></script>

</body>
</html>
