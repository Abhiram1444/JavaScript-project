<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio and Video Practice</title>
</head>
<body>

    <h1>Audio and Video Demo</h1>

    <h2>Audio Player</h2>

    </video>

</body>
